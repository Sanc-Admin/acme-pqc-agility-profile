name: Prior Art Monitor

on:
  schedule:
    - cron: '22 4,10,16,22 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  datatracker-sweep:
    name: IETF Datatracker prior-art sweep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Sweep Datatracker
        id: sweep
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python3 - <<'EOF'
          import requests, os
          THREAT_MAP = {
              "acme-pqc-agility-profile": ["acme-pqcnegotiation","acme-pqc","acme-agility"],
          }
          repo = os.environ.get("REPO_NAME","unknown")
          terms = THREAT_MAP.get(repo,[])
          threats_found = []
          for term in terms:
              try:
                  r = requests.get(f"https://datatracker.ietf.org/api/v1/doc/document/?name__contains={term}&format=json",timeout=15)
                  if r.ok:
                      for obj in r.json().get("objects",[]):
                          name = obj["name"]
                          if "draft-" in name and "vicente" not in name:
                              threats_found.append(f"{name} (rev -{obj.get('rev','?')}, {obj.get('time','')[:10]})")
              except Exception as e:
                  print(f"WARN: {e}")
          gho = os.environ.get("GITHUB_OUTPUT","")
          if threats_found:
              [print(f"  - {t}") for t in threats_found]
              gho and open(gho,"a").write("threats_found=true\n")
          else:
              print(f"No threats for {repo}")
              gho and open(gho,"a").write("threats_found=false\n")
          EOF

      - name: Open issue on threat
        if: steps.sweep.outputs.threats_found == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `[PRIOR-ART] Threat — ${context.repo.repo} — ${new Date().toISOString().slice(0,10)}`,
              body: `Datatracker sweep detected competing drafts. Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['prior-art','intel','action-required']
            });
